apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            # Override with secret for production: secretKeyRef name=grafana-admin key=admin-password
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost:3000"
          volumeMounts:
            - name: provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: provisioning-dashboards-json
              mountPath: /etc/grafana/provisioning/dashboards/json
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: provisioning-datasources
          configMap:
            name: grafana-datasources
        - name: provisioning-dashboards
          configMap:
            name: grafana-dashboard-provider
        - name: provisioning-dashboards-json
          configMap:
            name: grafana-dashboards
