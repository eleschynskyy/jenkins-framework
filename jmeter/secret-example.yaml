# Example Kubernetes Secret for JMeter properties used in scripts (e.g. ${__property(my-secret,,)}).
# Create the real secret with your values; do not commit actual secrets to git.
#
# Option A – create from literal (replace YOUR_SECRET_VALUE):
#   kubectl create secret generic jmeter-secrets -n sandbox \
#     --from-literal=my-secret=YOUR_SECRET_VALUE
#
# Option B – create from file:
#   kubectl create secret generic jmeter-secrets -n sandbox \
#     --from-file=my-secret=./path/to/secret.txt
#
# Option C – apply this file after encoding values (base64):
#   echo -n "YOUR_SECRET_VALUE" | base64
#   Then set that as the value below and: kubectl apply -f secret-example.yaml -n sandbox
#
# Secret keys are exposed as env vars in the jmeter container; keys must be valid env names
# (e.g. use my_secret or MY_SECRET). The JCasC maps secret key "my-secret" -> env MY_SECRET;
# in the pipeline run JMeter with: -Jmy-secret=$MY_SECRET
#
apiVersion: v1
kind: Secret
metadata:
  name: jmeter-secrets
  namespace: sandbox
type: Opaque
# data values must be base64-encoded; replace with your encoded secret
data:
  # Example: echo -n "my-secret-value" | base64  -> bXktc2VjcmV0LXZhbHVl
  my-secret: bXktc2VjcmV0LXZhbHVl   # placeholder; replace before use
---
# Optional: if you prefer to use stringData (plain text, only for dev):
# apiVersion: v1
# kind: Secret
# metadata:
#   name: jmeter-secrets
#   namespace: sandbox
# type: Opaque
# stringData:
#   my-secret: "your-actual-secret-here"
