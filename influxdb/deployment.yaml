apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
        - name: influxdb
          image: influxdb:2.7
          ports:
            - containerPort: 8086
          env:
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: "setup"
            - name: DOCKER_INFLUXDB_INIT_USERNAME
              value: "admin"
            - name: DOCKER_INFLUXDB_INIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: influxdb-auth
                  key: influxdb-admin-password
            - name: DOCKER_INFLUXDB_INIT_ORG
              value: "sandbox"
            - name: DOCKER_INFLUXDB_INIT_BUCKET
              value: "default"
            - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-auth
                  key: influxdb-admin-token
          volumeMounts:
            - name: data
              mountPath: /var/lib/influxdb2
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: influxdb-data
