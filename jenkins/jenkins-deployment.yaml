apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins
      securityContext:
        fsGroup: 1000

      containers:
        - name: jenkins
          image: sandbox/jenkins:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

          env:
            - name: CASC_JENKINS_CONFIG
              value: /var/jenkins_home/casc_configs
            - name: JAVA_OPTS
              value: "-Djenkins.install.runSetupWizard=false -Djenkins.model.Jenkins.slaveAgentPort=-1"

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2"

          # Jenkins can take 1–2 minutes to start; startup probe avoids premature restarts
          startupProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

          volumeMounts:
            # ✅ REAL writable Jenkins home
            - name: jenkins-home
              mountPath: /var/jenkins_home

            # ✅ JCasC config mounted inside home
            - name: casc-volume
              mountPath: /var/jenkins_home/casc_configs
              readOnly: true

            # ✅ Job DSL scripts
            - name: jobs-volume
              mountPath: /var/jenkins_home/jobs-dsl
              readOnly: true

      volumes:
        # 🔥 This fixes your problem
        - name: jenkins-home
          emptyDir: {}

        - name: casc-volume
          configMap:
            name: jenkins-casc

        - name: jobs-volume
          configMap:
            name: jenkins-jobs