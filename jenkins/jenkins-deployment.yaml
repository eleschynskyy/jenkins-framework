apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: sandbox
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins
  namespace: sandbox
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/exec
      - pods/log
    verbs:
      - create
      - delete
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins
  namespace: sandbox
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: sandbox
roleRef:
  kind: Role
  name: jenkins
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins
      containers:
        - name: jenkins
          image: sandbox/jenkins:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: CASC_JENKINS_CONFIG
              value: /var/jenkins_home/casc_configs
            - name: JAVA_OPTS
              value: "-Djenkins.install.runSetupWizard=false"
          volumeMounts:
            - name: casc-volume
              mountPath: /var/jenkins_home/casc_configs
      volumes:
        - name: casc-volume
          configMap:
            name: jenkins-casc
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: sandbox
spec:
  type: ClusterIP
  selector:
    app: jenkins
  ports:
    - port: 8080
      targetPort: 8080